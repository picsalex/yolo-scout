name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies (CPU-only PyTorch)
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
          UV_INDEX_STRATEGY: unsafe-best-match
        run: uv sync

      - name: Run unit tests
        run: |
          uv run pytest tests/unit/ \
            --skip-download \
            --cov=yolo_scout \
            --cov-report=xml \
            --cov-report=term

      - uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: unittests-py${{ matrix.python-version }}
          name: unit-tests-${{ matrix.python-version }}
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - uses: actions/cache@v6
        with:
          path: tests/fixtures/.cache
          key: test-datasets-${{ hashFiles('tests/fixtures/dataset_manager.py') }}
          restore-keys: test-datasets-

      - name: Install dependencies (CPU-only PyTorch)
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
          UV_INDEX_STRATEGY: unsafe-best-match
        run: uv sync

      - run: uv run python tests/fixtures/dataset_manager.py download

      - run: uv run python tests/fixtures/dataset_manager.py info

      - name: Run integration tests
        run: |
          uv run pytest tests/integration/ \
            -m "not slow" \
            --cov=yolo_scout \
            --cov-report=xml \
            --cov-report=term

      - uses: codecov/codecov-action@v7
        with:
          file: ./coverage.xml
          flags: integration
          name: integration-tests
          fail_ci_if_error: false

  integration-tests-slow:
    name: Integration Tests (Slow - Embeddings)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies (CPU-only PyTorch)
        env:
          UV_EXTRA_INDEX_URL: https://download.pytorch.org/whl/cpu
          UV_INDEX_STRATEGY: unsafe-best-match
        run: uv sync

      - run: uv run python tests/fixtures/dataset_manager.py download

      - name: Run slow integration tests
        run: |
          uv run pytest tests/integration/test_embeddings_pipeline.py \
            --cov=yolo_scout \
            --cov-report=xml \
            --cov-report=term

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" == "success" ] && \
             [ "${{ needs.integration-tests.result }}" == "success" ]; then
            echo "All tests passed!"
            exit 0
          else
            echo "Some tests failed:"
            echo "  Unit tests: ${{ needs.unit-tests.result }}"
            echo "  Integration tests: ${{ needs.integration-tests.result }}"
            exit 1
          fi
