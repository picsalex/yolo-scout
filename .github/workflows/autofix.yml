name: autofix.ci
on:
  pull_request:
  push:
permissions: {}
jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bunx prettier . --write
      - uses: autofix-ci/action@v1.3.4
        with:
          commit-message: "style: 🎨 apply Prettier formatting"
